<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Flota - QR</title>
    
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --primary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --border-color: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
        }

        .main-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 10px 0;
        }

        .main-header h1 {
            font-size: 2.2rem;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        .date-display {
            color: var(--text-muted);
            font-size: 1rem;
            text-transform: capitalize;
        }

        .dashboard-container {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 6px solid var(--primary);
        }

        .card h3 {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .card-in { border-left-color: var(--success); }
        .card-out { border-left-color: var(--danger); }

        .metric-number {
            font-size: 2.2rem;
            font-weight: bold;
        }

        .scanner-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
        }

        .scanner-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 320px;
        }

        .camera-placeholder {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #000;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        /* Ajuste para que la librería renderice correctamente el lector */
        #webcam-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scanner-laser {
            position: absolute;
            width: 100%;
            height: 4px;
            background: var(--danger);
            top: 0;
            box-shadow: 0 0 10px var(--danger);
            animation: scan 2s linear infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        @media (max-width: 480px) {
            .main-header h1 { font-size: 1.8rem; }
            .metrics-grid { gap: 12px; }
            .card { padding: 15px; }
            .metric-number { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <h1>Control de Accesos</h1>
        <p class="date-display" id="currentDate">Cargando fecha...</p>
    </header>

    <main class="dashboard-container">
        
        <section class="metrics-grid">
            <div class="card card-in">
                <h3>Entradas Hoy</h3>
                <p class="metric-number" id="contadorEntradas">0</p>
            </div>
            <div class="card card-out">
                <h3>Salidas Hoy</h3>
                <p class="metric-number" id="contadorSalidas">0</p>
            </div>
        </section>

        <section class="scanner-section">
            <div class="scanner-box">
                <div class="camera-placeholder">
                    <div id="webcam-preview"></div>
                    <div class="scanner-laser"></div>
                </div>
                <div class="scanner-actions">
                    <button class="btn btn-primary" id="btnIniciar">Iniciar Escáner</button>
                </div>
            </div>
        </section>

    </main>

    <script>
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('es-ES', dateOptions);
    </script>
    
    <script src="script.js"></script>
</body>
</html>
