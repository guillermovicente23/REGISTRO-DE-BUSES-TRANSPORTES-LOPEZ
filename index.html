<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Autobuses - Escáner QR</title>
    <link rel="stylesheet" href="css/estilos.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>

    <div class="container">
        <h1>EcoSort Trans-Control</h1>
        <p class="subtitle">Selecciona el tipo de movimiento antes de escanear la unidad</p>
        
        <div class="menu-control">
            <button id="btn-entrada" class="btn-toggle active" onclick="setMovimiento('ENTRADA')">📥 ENTRADA</button>
            <button id="btn-salida" class="btn-toggle" onclick="setMovimiento('SALIDA')">📤 SALIDA</button>
        </div>
        
        <div id="reader" class="scanner-box"></div>
        
        <div id="resultado" class="mensaje"></div>
    </div>

    <script>
        // Por defecto el sistema inicia listo para marcar Entrada
        let movimientoActual = "ENTRADA"; 

        function setMovimiento(tipo) {
            movimientoActual = tipo;
            document.getElementById('btn-entrada').classList.remove('active');
            document.getElementById('btn-salida').classList.remove('active');
            
            if(tipo === 'ENTRADA') {
                document.getElementById('btn-entrada').classList.add('active');
            } else {
                document.getElementById('btn-salida').classList.add('active');
            }
        }

        // Esta función se activa en automático cuando la cámara lee un QR
        function onScanSuccess(decodedText, decodedResult) {
            // Detener el escáner momentáneamente para evitar lecturas repetidas por segundo
            html5QrcodeScanner.clear();
            
            // Limpiar el ID de la placa (data) quitando espacios extra
            const placaBus = decodedText.trim();

            document.getElementById('resultado').className = "mensaje procesando";
            document.getElementById('resultado').innerText = "Procesando Placa: " + placaBus;

            // Enviamos los datos al Backend de Java por método POST
            fetch('ControladorAutobuses', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'codigoBus=' + encodeURIComponent(placaBus) + '&movimiento=' + encodeURIComponent(movimientoActual)
            })
            .then(response => response.text())
            .then(data => {
                // El backend nos responde con el éxito del registro
                document.getElementById('resultado').className = "mensaje exito";
                document.getElementById('resultado').innerText = data;
                
                // Reiniciar la cámara en 3 segundos para el próximo autobús
                setTimeout(reiniciarEscaner, 3000);
            })
            .catch(error => {
                document.getElementById('resultado').className = "mensaje error";
                document.getElementById('resultado').innerText = "Error de comunicación con el servidor.";
                setTimeout(reiniciarEscaner, 3000);
            });
        }

        function onScanFailure(error) {
            // Ignorar fallos continuos de enfoque de cámara
        }

        let html5QrcodeScanner;
        function reiniciarEscaner() {
            document.getElementById('resultado').innerText = "";
            document.getElementById('resultado').className = "mensaje";
            
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 14, qrbox: {width: 250, height: 250} }, false);
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }

        // Arrancar la cámara al abrir la aplicación
        reiniciarEscaner();
    </script>
</body>
</html>
