<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Flota - QR</title>
    
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --primary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --border-color: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px;
        }

        .main-header {
            text-align: center;
            margin-bottom: 25px;
            padding: 10px 0;
        }

        .main-header h1 {
            font-size: 1.8rem;
            color: var(--text-main);
        }

        .date-display {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: capitalize;
        }

        .dashboard-container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid var(--primary);
        }

        .card h3 {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .card-in { border-left-color: var(--success); }
        .card-out { border-left-color: var(--danger); }

        .metric-number {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .scanner-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .scanner-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .camera-placeholder {
            width: 100%;
            max-width: 280px;
            aspect-ratio: 1 / 1;
            background: #000;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        #webcam-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scanner-laser {
            position: absolute;
            width: 100%;
            height: 3px;
            background: var(--danger);
            top: 0;
            box-shadow: 0 0 8px var(--danger);
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
            max-width: 200px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .history-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .history-section h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .table-responsive {
            overflow-x: auto;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.95rem;
        }

        .history-table th, .history-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .history-table th {
            color: var(--text-muted);
            font-weight: 600;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
        }

        .badge-in { background: #e8f8f5; color: var(--success); }
        .badge-out { background: #fdedec; color: var(--danger); }

        @media (max-width: 480px) {
            .main-header h1 { font-size: 1.5rem; }
            .card h3 { font-size: 0.8rem; }
            .metric-number { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <h1>Control de Accesos</h1>
        <p class="date-display" id="currentDate">Registro de Unidades</p>
    </header>

    <main class="dashboard-container">
        
        <section class="metrics-grid">
            <div class="card card-in">
