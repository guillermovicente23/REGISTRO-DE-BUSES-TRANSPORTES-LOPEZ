<!DOCTYPE html>
<html lang="es"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Básica de Escaneo</title>
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        /* Estilos muy básicos para centrar la prueba en pantalla */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            padding: 20px;
        }
        .caja-escaner {
            max-width: 400px;
            margin: 20px auto;
            border: 3px solid #333;
            background-color: #fff;
            border-radius: 8px;
        }
        .pantalla-placa {
            font-size: 24px;
            font-weight: bold;
            color: #007bff;
            margin-top: 20px;
            padding: 10px;
            background-color: #e9ecef;
            display: inline-block;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>Paso 1: Detectar Placa</h1>
    <p>Apunta la cámara hacia el código QR para ver qué texto contiene</p>

    <div id="lector-camara" class="caja-escaner"></div>

    <div>
        <span>Placa detectada:</span><br>
        <div id="placa-resultado" class="pantalla-placa">Esperando código...</div>
    </div>

    <script>
        // Esta función se ejecuta inmediatamente cuando la cámara lee cualquier QR
        function lecturaExitosa(textoEscaneado, resultadoDetallado) {
            // Mostramos el texto limpio en la pantalla del navegador
            document.getElementById('placa-resultado').innerText = textoEscaneado;
            
            // Nota: Aquí no estamos usando JSON.parse() ni enviando nada a Java,
            // solo queremos ver el texto plano en pantalla.
        }

        function lecturaFallida(error) {
            // Ignoramos errores de enfoque continuos de la cámara
        }

        // Configuramos e iniciamos el escáner
        const escáner = new Html5QrcodeScanner("lector-camara", { fps: 10, qrbox: 250 }, false);
        escáner.render(lecturaExitosa, lecturaFallida);
    </script>

</body>
</html>
