<!DOCTYPE html>
<html lang="es"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Entradas y Salidas</title>
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        /* --- ESTILOS GENERALES Y FONDO --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #334155;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        h1 {
            color: #f8fafc;
            font-size: 26px;
            font-weight: 700;
            margin-top: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        h3 {
            font-size: 16px;
            color: #475569;
            margin-bottom: 10px;
            margin-top: 5px;
            text-align: left;
            border-left: 4px solid #3b82f6;
            padding-left: 8px;
        }

        p {
            color: #94a3b8;
            font-size: 14px;
        }

        /* --- PANTALLA DE LOGIN --- */
        .contenedor-login {
            max-width: 360px;
            margin: 80px auto;
            padding: 35px 25px;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .contenedor-login h2 {
            margin-top: 0;
            color: #1e293b;
            font-size: 24px;
            font-weight: 700;
        }

        .contenedor-login p {
            color: #64748b;
            margin-bottom: 25px;
        }

        .input-login {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            background-color: #f8fafc;
            color: #1e293b;
            transition: all 0.3s ease;
        }

        .input-login:focus {
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            outline: none;
        }

        .btn-login {
            width: 98%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            transition: all 0.2s ease;
        }

        .btn-login:hover { 
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
        }

        .btn-login:active { transform: translateY(1px); }

        /* --- PANEL PRINCIPAL --- */
        .panel-principal {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .usuario-activo {
            font-size: 14px;
            color: #cbd5e1;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .usuario-activo strong {
            color: #3b82f6;
        }

        /* --- FORMULARIO DE REGISTRO --- */
        .contenedor-formulario {
            margin: 20px auto;
            padding: 25px;
            max-width: 400px;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }

        .seccion-bloque {
            background-color: #f8fafc;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #edf2f7;
        }

        .contenedor-radios {
            display: flex;
            justify-content: space-around;
            padding: 5px 0;
        }

        .opcion-radio {
            font-size: 16px;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            display: flex;
            align-items: center;
            background-color: #ffffff;
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #e2e8f0;
            transition: all 0.2s ease;
            width: 40%;
            justify-content: center;
        }

        .opcion-radio input {
            transform: scale(1.2);
            margin-right: 8px;
            cursor: pointer;
        }

        .opcion-radio:hover {
            border-color: #cbd5e1;
            background-color: #f1f5f9;
        }

        .selector-tipo {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            background-color: #ffffff;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .selector-tipo:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .campo-placa {
            width: 90%;
            padding: 14px;
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            text-transform: uppercase;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            color: #1e3a8a;
            background-color: #f1f5f9;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .btn-registrar {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            transition: all 0.2s ease;
        }

        .btn-registrar:hover { 
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
        }

        .btn-registrar:active { transform: scale(0.99); }

        .btn-deshacer {
            display: none;
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #64748b;
            background-color: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.2s ease;
        }

        .btn-deshacer:hover {
            background-color: #fee2e2;
            color: #ef4444;
            border-color: #fca5a5;
        }

        .estado-envio {
            margin-top: 15px;
            font-weight: 700;
            font-size: 15px;
            padding: 8px;
            border-radius: 6px;
        }

        /* --- CAJA DEL ESCÁNER CÁMARA --- */
        .caja-escaner {
            max-width: 400px;
            margin: 25px auto;
            border: 4px solid #1e293b;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        #lector-camara button {
            background-color: #3b82f6 !important;
            color: white !important;
            border: none !important;
            padding: 10px 20px !important;
            font-size: 14px !important;
            font-weight: bold !important;
            border-radius: 6px !important;
            cursor: pointer !important;
            margin: 10px 0 !important;
            box-shadow: 0 2px 6px rgba(59, 130, 246, 0.3) !important;
            transition: background-color 0.2s !important;
        }
        #lector-camara button:hover { background-color: #1d4ed8 !important; }
    </style>
</head>
<body>

    <div id="pantalla-login" class="contenedor-login">
        <h2>Control de Autobuses</h2>
        <p>Inicia sesión para continuar</p>
        <div id="error-login" style="color: #ef4444; font-weight: bold; margin-bottom: 15px; font-size: 14px;"></div>
        
        <input type="text" id="usuario" class="input-login" placeholder="Usuario">
        <input type="password" id="contrasena" class="input-login" placeholder="Contraseña">
        
        <button class="btn-login" onclick="autenticarUsuario()">INGRESAR</button>
    </div>

    <div id="panel-sistema" class="panel-principal">
        <h1>Control de Flujo de Autobuses</h1>
        <div class="usuario-activo">Sesión activa: <strong id="nombre-sesion"></strong></div>
        
        <div class="contenedor-formulario">
            <div class="seccion-bloque">
                <h3>1. Movimiento:</h3>
                <div class="contenedor-radios">
                    <label class="opcion-radio">
                        <input type="radio" name="tipoMovimiento" value="ENTRADA" checked> Entrada
                    </label>
                    <label class="opcion-radio">
                        <input type="radio" name="tipoMovimiento" value="SALIDA"> Salida
                    </label>
                </div>
            </div>

            <div class="seccion-bloque">
                <h3>2. Clasificación / Destino:</h3>
                <select id="tipo-servicio" class="selector-tipo">
                    <option value="PREDIO CAÑAL">🌾 PREDIO CAÑAL</option>
                    <option value="INGENIO MAGDALENA">🏭 INGENIO MAGDALENA</option>
                    <option value="PROBAR BUS">⚙️ PROBAR BUS</option>
                    <option value="ELECTROMECANICA">⚡ ELECTROMECANICA</option>
                    <option value="SERVICIO GRUA">🚨 SERVICIO GRUA</option>
                    <option value="FULEO">⛽ FULEO</option>
                    
                    <option value="RUTA">🚌 RUTA</option>
                    <option value="VIAJE">🗺️ VIAJE</option>
                    <option value="TALLER">🔧 TALLER</option>
                    <option value="APOYO">🤝 APOYO</option>
                    <option value="LAVADO">🧼 LAVADO</option>
                </select>
            </div>

            <div class="seccion-bloque">
                <h3>3. Placa detectada/manual:</h3>
                <input type="text" id="placa-input" class="campo-placa" placeholder="ESPERANDO QR..." autocomplete="off">
            </div>
            
            <button id="btn-enviar" class="btn-registrar" onclick="enviarDatosAGoogle()">AGREGAR REGISTRO</button>
            
            <button id="btn-borrar" class="btn-deshacer" onclick="eliminarUltimoRegistro()">¿Te equivocaste? Deshacer último registro</button>
            
            <div id="estado-envio" class="estado-envio"></div>
        </div>

        <p>Apunta la cámara al código QR o escribe la placa manualmente arriba</p>
        <div id="lector-camara" class="caja-escaner"></div>
    </div>

    <script>
const URL_GOOGLE_SCRIPT = 'https://script.google.com/macros/s/AKfycbypXTYZioHLgtI517yEJ8t6iPov9o7B3e7Ybi0cr8kZLpIErCde4OC0uLXBw5CP-S1c/exec';        
        // BASE DE DATOS DE CREDENCIALES
        const USUARIOS_VALIDOS = {
            "admin": { contrasena: "admin123", rol: "ADMIN" },
            "seguridad1": { contrasena: "seg123", rol: "OPERADOR" },
            "seguridad2": { contrasena: "seg456", rol: "OPERADOR" },
            "taller": { contrasena: "taller2026", rol: "OPERADOR" }
        };

        let idUsuarioActivo = "";
        let usuarioLogueado = null;
        let escaner = null;

        function autenticarUsuario() {
            const userIn = document.getElementById('usuario').value.trim().toLowerCase();
            const passIn = document.getElementById('contrasena').value.trim();
            const divError = document.getElementById('error-login');

            if (USUARIOS_VALIDOS[userIn]) {
                if (USUARIOS_VALIDOS[userIn].contrasena === passIn) {
                    idUsuarioActivo = userIn.toUpperCase(); 
                    usuarioLogueado = USUARIOS_VALIDOS[userIn];
                    document.getElementById('pantalla-login').style.display = 'none';
                    document.getElementById('panel-sistema').style.display = 'block';
                    document.getElementById('nombre-sesion').innerText = idUsuarioActivo;

                    if (usuarioLogueado.rol === "ADMIN") {
                        document.getElementById('btn-borrar').style.display = 'inline-block';
                    }
                    iniciarEscaner();
                    return; 
                }
            }
            divError.innerText = "Usuario o contraseña incorrectos.";
        }

        function iniciarEscaner() {
            escaner = new Html5QrcodeScanner(
                "lector-camara", 
                { 
                    fps: 10, 
                    qrbox: { width: 250, height: 250 },
                    rememberLastUsedCamera: true,
                    supportedScanTypes: [0] 
                }, 
                false
            );
            escaner.render(lecturaExitosa, lecturaFallida);
            
            setTimeout(() => {
                const btnEscaner = document.querySelector('#lector-camara button');
                if(btnEscaner && btnEscaner.innerText.includes('Request Camera Permissions')) {
                    btnEscaner.innerText = 'Activar Cámara de Monitoreo';
                }
            }, 300);
        }

        function lecturaExitosa(textoEscaneado, resultadoDetallado) {
            const inputPlaca = document.getElementById('placa-input');
            if (inputPlaca.value !== textoEscaneado) {
                inputPlaca.value = textoEscaneado.toUpperCase();
                inputPlaca.style.backgroundColor = "#d4edda";
                setTimeout(() => { inputPlaca.style.backgroundColor = "#f1f5f9"; }, 500);
            }
        }

        function lecturaFallida(error) {}

        function enviarDatosAGoogle() {
            const inputPlaca = document.getElementById('placa-input');
            const divEstado = document.getElementById('estado-envio');
            const boton = document.getElementById('btn-enviar');
            const selectTipo = document.getElementById('tipo-servicio');
            const placaTexto = inputPlaca.value.trim();

            if (placaTexto === "" || placaTexto === "ESPERANDO QR...") {
                divEstado.style.color = "#dc3545";
                divEstado.innerText = "Por favor, ingresa o escanea una placa.";
                return;
            }

            const opciones = document.getElementsByName('tipoMovimiento');
            let movimientoSeleccionado = "";
            for (const opcion of opciones) {
                if (opcion.checked) { movimientoSeleccionado = opcion.value; break; }
            }

            const tipoSeleccionado = selectTipo.value;

            boton.disabled = true;
            divEstado.style.color = "#d97706";
            divEstado.innerText = "Enviando datos...";

            const datosFormulario = new URLSearchParams();
            datosFormulario.append('accion', 'REGISTRAR');
            datosFormulario.append('placa', placaTexto);
            datosFormulario.append('movimiento', movimientoSeleccionado);
            datosFormulario.append('tipo', tipoSeleccionado);
            datosFormulario.append('operador', idUsuarioActivo);

            fetch(URL_GOOGLE_SCRIPT, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: datosFormulario.toString()
            })
            .then(() => {
                divEstado.style.color = "#059669";
                divEstado.innerText = `¡${movimientoSeleccionado} (${tipoSeleccionado}) registrada con éxito!`;
                inputPlaca.value = ""; 
                inputPlaca.blur(); 
            })
            .catch(error => {
                divEstado.style.color = "#dc3545";
                divEstado.innerText = "Error de red.";
            })
            .finally(() => {
                setTimeout(() => { boton.disabled = false; divEstado.innerText = ""; }, 2000);
            });
        }

        function eliminarUltimoRegistro() {
            if (!usuarioLogueado || usuarioLogueado.rol !== "ADMIN") {
                alert("No tienes permisos.");
                return;
            }

            const divEstado = document.getElementById('estado-envio');
            const botonBorrar = document.getElementById('btn-borrar');

            if (!confirm("¿Estás seguro de que deseas eliminar el ÚLTIMO registro de la lista?")) {
                return; 
            }

            botonBorrar.disabled = true;
            divEstado.style.color = "#dc3545";
            divEstado.innerText = "Eliminando última fila...";

            const datosFormulario = new URLSearchParams();
            datosFormulario.append('accion', 'ELIMINAR');

            fetch(URL_GOOGLE_SCRIPT, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: datosFormulario.toString()
            })
            .then(() => {
                divEstado.style.color = "#059669";
                divEstado.innerText = "¡El último registro fue eliminado exitosamente!";
            })
            .catch(error => {
                divEstado.style.color = "#dc3545";
                divEstado.innerText = "Error al intentar borrar.";
            })
            .finally(() => {
                setTimeout(() => { botonBorrar.disabled = false; divEstado.innerText = ""; }, 2000);
            });
        }
    </script>

</body>
</html>
